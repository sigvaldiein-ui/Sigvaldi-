<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alvitur — Mínar Síður</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #080B12;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 16px;
      background: #0f1320;
      border-bottom: 1px solid #2d3348;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header a { color: #818cf8; text-decoration: none; font-size: 14px; }
    header h1 { font-size: 18px; color: #fff; }
    header .status { color: #34d399; font-size: 12px; }
    #chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    #chat-form {
      padding: 12px 16px;
      background: #0f1320;
      border-top: 1px solid #2d3348;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #chat-input {
      flex: 1;
      background: #1a1f2e;
      border: 1px solid #2d3348;
      color: #e2e8f0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 15px;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    #chat-input:focus { border-color: #818cf8; }
    #chat-input::placeholder { color: #64748b; }
    #send-btn {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
    }
    #send-btn:hover { background: #4338ca; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <a href="/">&larr; Til baka</a>
    <h1>Alvitur</h1>
    <span class="status">&#9679; Tengt</span>
  </header>

  <div id="chat-history"></div>

  <form id="chat-form">
    <textarea id="chat-input" rows="1" placeholder="Skrifaðu spurninguna þína hér..."></textarea>
    <button id="send-btn" type="submit">Senda</button>
  </form>

  <script src="/static/minarsidur.js"></script>
</body>
</html>
