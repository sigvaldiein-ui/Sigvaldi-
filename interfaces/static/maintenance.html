<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alvitur - Í uppfærslu</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1a1c2c, #4a192c);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #ff3e81; }
        p { font-size: 1.1rem; line-height: 1.6; opacity: 0.8; }
        .logo { font-size: 3rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ALVITUR</div>
        <h1>Vefurinn er í uppfærslu</h1>
        <p>Við erum að vinna í því að gera Alvitur enn snjallari fyrir þig.<br>Við opnum aftur innan skamms.</p>
        <p style="font-size: 0.8rem; margin-top: 20px; opacity: 0.5;">© 2026 Alvitur</p>
    </div>
</body>
</html>
